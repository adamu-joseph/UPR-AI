name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and dependencies
        run: |
          pip install -e ".[dev]"

      # ---------------- LINTING ----------------
      - name: Run Ruff (lint)
        run: ruff check .

      - name: Run Black (format check)
        run: black --check .

      # ---------------- TYPE CHECKING ----------------
      - name: Run MyPy
        run: mypy src

      # ---------------- TESTING ----------------
      - name: Run Pytest
        run: pytest tests/

      - name: Run coverage report
        run: pytest --cov=src --cov-report=xml

      # ---------------- SECURITY ----------------
      - name: Run Bandit (security scan)
        run: bandit -r src

      - name: Run pip-audit
        run: pip-audit