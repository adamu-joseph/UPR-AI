version: 1

disable_existing_loggers: false

formatters:
  json:
    (): upr_ai.utils.logger.JSONFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: json
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: "artifacts/logs/app.log"
    maxBytes: 10485760   # 10MB
    backupCount: 5
    encoding: utf8

root:
  level: INFO
  handlers: [console, file]

loggers:
  app:
    level: INFO
    handlers: [console, file]
    propagate: false